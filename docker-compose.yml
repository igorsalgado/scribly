services:
  scribly:
    build:
      context: .
      args:
        HF_TOKEN: ${HF_TOKEN}
        WHISPER_MODEL: ${WHISPER_MODEL:-medium}
    image: scribly:latest
    container_name: scribly
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./output:/app/output
      - scribly_db:/app/scribly.db
    stdin_open: true
    tty: true
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    container_name: scribly-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  ollama_data:
  scribly_db:
