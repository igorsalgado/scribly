services:
  redis:
    image: redis:7-alpine
    container_name: scribly-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  scribly-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}
        WHISPER_MODEL: ${WHISPER_MODEL:-medium}
    image: scribly-worker:latest
    container_name: scribly-worker
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OUTPUT_DIR: /app/output
      DB_PATH: /app/data/scribly.db
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    container_name: scribly-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  ollama_data:
  redis_data:
